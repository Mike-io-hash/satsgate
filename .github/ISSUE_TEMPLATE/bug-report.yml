name: "Bug report"
description: "Report a bug in satsgate (hosted or self-hosted)"
title: "Bug: <short summary>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report.

        **Do not paste secrets** (API keys, NWC strings, private keys).

  - type: dropdown
    id: where
    attributes:
      label: Where did you hit this?
      options:
        - "Hosted (https://api.satsgate.org)"
        - "Self-hosted"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Describe the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Commands, requests, or minimal steps.
      placeholder: |
        1) ...
        2) ...
        3) ...
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / response (redacted)
      description: Paste relevant logs or HTTP responses, with secrets removed.
    validations:
      required: false
